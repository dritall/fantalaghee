name: Gazzetta — genera copertine

# Quando Hermes committa un nuovo articolo (.md con blocco `cover:` nel frontmatter),
# questa Action genera l'immagine di copertina mancante e la committa.
# Il push dell'immagine è fatto con GITHUB_TOKEN, che NON ri-innesca le Action:
# nessun loop.

on:
  push:
    branches: [main]
    paths:
      - 'public/articoli/md/**.md'
  workflow_dispatch:   # avvio manuale dalla tab Actions (rigenera le immagini mancanti)

permissions:
  contents: write

jobs:
  cover:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Ensure Chromium for Puppeteer
        run: npx puppeteer browsers install chrome

      - name: Genera copertine mancanti
        id: build
        run: node scripts/gazzetta/build_cover_from_md.js --all

      - name: Commit immagini generate
        run: |
          if [[ -n "$(git status --porcelain public/image/gazzetta)" ]]; then
            git config user.name "gazzetta-bot"
            git config user.email "actions@users.noreply.github.com"
            git add public/image/gazzetta
            git commit -m "Gazzetta: copertine generate automaticamente"
            git push
          else
            echo "Nessuna nuova copertina da committare."
          fi
